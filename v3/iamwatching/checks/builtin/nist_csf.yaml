# NIST CSF 2.0 + NIST SP 800-53 Rev 5 IAM Controls — COMPREHENSIVE
# Sources:
#   NIST CSF 2.0: https://www.nist.gov/cyberframework
#   NIST SP 800-53 Rev 5: https://csrc.nist.gov/pubs/sp/800/53/r5/upd1/final
# All checks use property-based detection (no relationship dependencies).

framework: NIST-800-53-R5
description: >
  NIST SP 800-53 Rev 5 and NIST CSF 2.0 IAM-relevant controls.
  Covers Access Control (AC), Identification and Authentication (IA),
  Configuration Management (CM), and Audit/Accountability (AU) families.

checks:

  # ── AC: Access Control ───────────────────────────────────────────────────

  - id: NIST-AC-2.1
    title: "AC-2: Account Management — identify and remove inactive accounts"
    severity: MEDIUM
    description: >
      NIST AC-2: Organizations must manage system accounts including creating,
      activating, modifying, reviewing, disabling, and removing accounts.
      IAM users with no recorded activity should be reviewed.
    cypher: |
      MATCH (p:AWSPrincipal {principal_type: 'User'})
      WHERE NOT p.name = 'root'
        AND (p.attached_policy_count = 0 OR p.attached_policy_count IS NULL)
        AND (p.inline_policy_count = 0 OR p.inline_policy_count IS NULL)
        AND (p.tags = '{}' OR p.tags IS NULL)
      RETURN p.arn AS user_arn,
             p.name AS username,
             p.metadata AS metadata,
             'Unmanaged user — no policies and no tags; verify if active' AS issue
      ORDER BY p.name
      LIMIT 100
    recommendation: >
      Implement quarterly user access reviews. Disable accounts for users who
      have left or changed roles. Remove accounts that have been disabled for 90+ days.
    mitre: ["T1078 - Valid Accounts"]
    references: ["https://csf.tools/reference/nist-sp-800-53/r5/ac/ac-2/"]

  - id: NIST-AC-2.2
    title: "AC-2(3): Account Management — disable inactive accounts"
    severity: HIGH
    description: >
      NIST AC-2(3): The system automatically disables inactive accounts after
      a defined period. Users who have not logged in or used their access keys
      within 90 days represent stale credentials.
    cypher: |
      MATCH (p:AWSPrincipal {principal_type: 'User'})
      WHERE NOT p.name = 'root'
        AND p.metadata CONTAINS 'create_date'
      RETURN p.arn AS user_arn,
             p.name AS username,
             'Review credential report for users inactive >90 days — disable per AC-2(3)' AS action
      ORDER BY p.name
      LIMIT 100
    recommendation: >
      Use AWS Config rule iam-user-unused-credentials-check (90 days).
      Automate disable via Lambda triggered by Config non-compliance.
    mitre: ["T1078.004 - Cloud Accounts"]
    references: ["https://csf.tools/reference/nist-sp-800-53/r5/ac/ac-2/"]

  - id: NIST-AC-3.1
    title: "AC-3: Access Enforcement — verify role-based access control"
    severity: MEDIUM
    description: >
      NIST AC-3: The system enforces approved authorizations for logical access.
      All principals should have role-based access via groups/roles, not
      direct policy attachment.
    cypher: |
      MATCH (p:AWSPrincipal {principal_type: 'User'})
      WHERE p.attached_policy_count > 0
         OR p.inline_policy_count > 0
      RETURN p.arn AS user_arn,
             p.name AS username,
             p.attached_policy_count AS attached_count,
             p.inline_policy_count AS inline_count,
             'User has direct policy attachments — migrate to group/role-based access per AC-3' AS issue
      ORDER BY (p.attached_policy_count + p.inline_policy_count) DESC
      LIMIT 100
    recommendation: >
      Create IAM groups for each job function. Assign policies to groups.
      Add users to groups. Remove all directly attached and inline user policies.
    mitre: ["T1078 - Valid Accounts"]
    references: ["https://csf.tools/reference/nist-sp-800-53/r5/ac/ac-3/"]

  - id: NIST-AC-5.1
    title: "AC-5: Separation of Duties — admin functions not shared"
    severity: HIGH
    description: >
      NIST AC-5: Separation of duties prevents any individual from having
      complete control over critical processes. Admin principals should be
      dedicated and not used for day-to-day operations.
    cypher: |
      MATCH (p:AWSPrincipal {principal_type: 'User'})
      WHERE (p.attached_policies CONTAINS 'AdministratorAccess'
          OR p.inline_policies CONTAINS '"Action": "*"')
        AND p.metadata CONTAINS 'password_last_used'
      RETURN p.arn AS user_arn,
             p.name AS username,
             'Admin user also has console access — may violate separation of duties' AS issue
      ORDER BY p.name
    recommendation: >
      Admin users should be separate from daily-use accounts.
      Use IAM Identity Center (SSO) for admin access with dedicated admin accounts.
      Normal work should use non-admin accounts.
    mitre: ["T1078 - Valid Accounts", "T1548 - Abuse Elevation Control Mechanism"]
    references: ["https://csf.tools/reference/nist-sp-800-53/r5/ac/ac-5/"]

  - id: NIST-AC-6.1
    title: "AC-6: Least Privilege — identify over-privileged principals"
    severity: HIGH
    description: >
      NIST AC-6: Employ the principle of least privilege — allow only the
      authorized access for users and processes necessary to accomplish
      assigned tasks. Wildcard or admin policies violate this principle.
    cypher: |
      MATCH (p:AWSPrincipal)
      WHERE p.attached_policies CONTAINS 'AdministratorAccess'
         OR p.inline_policies CONTAINS '"Action": "*"'
         OR p.inline_policies CONTAINS '"Action":["*"]'
      RETURN p.arn AS principal_arn,
             p.name AS name,
             p.principal_type AS type,
             'Principal has admin or wildcard permissions — violates AC-6 least privilege' AS issue
      ORDER BY p.principal_type, p.name
    recommendation: >
      Use IAM Access Analyzer to generate least-privilege policies from
      CloudTrail activity. Remove AdministratorAccess except from break-glass accounts.
    mitre: ["T1078 - Valid Accounts", "T1548 - Abuse Elevation Control Mechanism"]
    references: ["https://csf.tools/reference/nist-sp-800-53/r5/ac/ac-6/"]

  - id: NIST-AC-6.2
    title: "AC-6(2): Least Privilege — non-privileged access for non-security functions"
    severity: MEDIUM
    description: >
      NIST AC-6(2): Users must use non-privileged accounts for general computing
      activities. Accounts with admin access should not be used for routine tasks.
    cypher: |
      MATCH (p:AWSPrincipal {principal_type: 'User'})
      WHERE (p.attached_policies CONTAINS 'AdministratorAccess'
          OR p.attached_policies CONTAINS 'PowerUserAccess')
        AND NOT toLower(p.name) CONTAINS 'admin'
        AND NOT toLower(p.name) CONTAINS 'svc'
        AND NOT toLower(p.name) CONTAINS 'break'
      RETURN p.arn AS user_arn,
             p.name AS username,
             'Non-admin-named user has Administrator or PowerUser access — review use case' AS issue
      ORDER BY p.name
    recommendation: >
      Ensure admin-level access is only granted to dedicated administrative accounts
      named clearly as such (e.g., sj-admin, breakglass-admin). Separate from daily-use accounts.
    mitre: ["T1078.004 - Cloud Accounts"]
    references: ["https://csf.tools/reference/nist-sp-800-53/r5/ac/ac-6/"]

  - id: NIST-AC-6.5
    title: "AC-6(5): Least Privilege — privileged accounts"
    severity: MEDIUM
    description: >
      NIST AC-6(5): Restrict privileged accounts to only those individuals
      requiring such privileges. Track all privileged accounts explicitly.
    cypher: |
      MATCH (p:AWSPrincipal)
      WHERE p.attached_policies CONTAINS 'AdministratorAccess'
         OR p.attached_policies CONTAINS 'PowerUserAccess'
         OR p.attached_policies CONTAINS 'IAMFullAccess'
      RETURN p.arn AS principal_arn,
             p.name AS name,
             p.principal_type AS type,
             'Privileged account — verify this is intentional and owner is documented' AS issue
      ORDER BY p.principal_type, p.name
    recommendation: >
      Maintain an inventory of all privileged accounts. Review quarterly.
      Require manager approval and documentation for all privileged access grants.
    mitre: ["T1078 - Valid Accounts"]
    references: ["https://csf.tools/reference/nist-sp-800-53/r5/ac/ac-6/"]

  # ── IA: Identification and Authentication ────────────────────────────────

  - id: NIST-IA-2.1
    title: "IA-2: Identification and Authentication — MFA for all users"
    severity: HIGH
    description: >
      NIST IA-2: The system uniquely identifies and authenticates organizational
      users. Multi-factor authentication is required for all privileged and
      non-privileged user accounts accessing cloud management consoles.
    cypher: |
      MATCH (p:AWSPrincipal {principal_type: 'User'})
      WHERE NOT p.name = 'root'
        AND NOT p.metadata CONTAINS '"mfa_active": true'
      RETURN p.arn AS user_arn,
             p.name AS username,
             'User does not have MFA — violates IA-2 identification requirements' AS issue
      ORDER BY p.name
    recommendation: >
      Enforce MFA via IAM policy conditions (aws:MultiFactorAuthPresent=true).
      Use AWS IAM Identity Center for centralized MFA management.
    mitre: ["T1078.004 - Cloud Accounts", "T1556 - Modify Authentication Process"]
    references: ["https://csf.tools/reference/nist-sp-800-53/r5/ia/ia-2/"]

  - id: NIST-IA-2.2
    title: "IA-2(1): Identification and Authentication — MFA for privileged accounts"
    severity: CRITICAL
    description: >
      NIST IA-2(1): MFA is required for privileged account access. Any privileged
      account (admin, power user) without MFA represents a critical authentication gap.
    cypher: |
      MATCH (p:AWSPrincipal {principal_type: 'User'})
      WHERE (p.attached_policies CONTAINS 'AdministratorAccess'
          OR p.attached_policies CONTAINS 'PowerUserAccess'
          OR p.attached_policies CONTAINS 'IAMFullAccess')
        AND NOT p.metadata CONTAINS '"mfa_active": true'
      RETURN p.arn AS user_arn,
             p.name AS username,
             'CRITICAL: Privileged user without MFA — immediate risk of account takeover' AS issue
      ORDER BY p.name
    recommendation: >
      Immediately require MFA for all privileged accounts. Use a deny-all SCP
      for accounts not using MFA. This is a critical finding requiring same-day remediation.
    mitre: ["T1078.004 - Cloud Accounts"]
    references: ["https://csf.tools/reference/nist-sp-800-53/r5/ia/ia-2/"]

  - id: NIST-IA-5.1
    title: "IA-5: Authenticator Management — credential rotation"
    severity: HIGH
    description: >
      NIST IA-5: The organization manages system authenticators by establishing
      minimum and maximum lifetime restrictions and reuse conditions.
      Access keys older than 90 days violate this control.
    cypher: |
      MATCH (p:AWSPrincipal {principal_type: 'User'})
      WHERE p.metadata CONTAINS 'access_key'
        AND NOT p.name = 'root'
      RETURN p.arn AS user_arn,
             p.name AS username,
             'Verify access key age via IAM credential report — rotate if >90 days per IA-5' AS action
      ORDER BY p.name
      LIMIT 100
    recommendation: >
      Rotate all access keys at least every 90 days. Use AWS Secrets Manager
      for automated rotation. Set Config rule access-keys-rotated.
    mitre: ["T1078.004 - Cloud Accounts", "T1098.001 - Additional Cloud Credentials"]
    references: ["https://csf.tools/reference/nist-sp-800-53/r5/ia/ia-5/"]

  - id: NIST-IA-5.2
    title: "IA-5(1): Authenticator Management — password complexity enforcement"
    severity: MEDIUM
    description: >
      NIST IA-5(1): Password-based authenticators must enforce minimum complexity
      requirements including length, character set diversity, and reuse restrictions.
    cypher: |
      MATCH (p:AWSPrincipal {principal_type: 'User'})
      WHERE NOT p.name = 'root'
      WITH count(p) AS user_count
      WHERE user_count > 0
      RETURN user_count,
             'Manual check: verify IAM password policy meets IA-5(1) requirements (14+ chars, complexity, no reuse)' AS action
      LIMIT 1
    recommendation: >
      IAM password policy: minimum 14 chars, uppercase, lowercase, numbers, symbols,
      no reuse of last 24, max age 90 days.
    mitre: ["T1110 - Brute Force"]
    references: ["https://csf.tools/reference/nist-sp-800-53/r5/ia/ia-5/"]

  # ── CM: Configuration Management ────────────────────────────────────────

  - id: NIST-CM-2.1
    title: "CM-2: Baseline Configuration — resource inventory completeness"
    severity: LOW
    description: >
      NIST CM-2: The organization develops, documents, and maintains a current
      baseline configuration. Resources without tags cannot be included in
      a complete baseline inventory.
    cypher: |
      MATCH (r:Resource)
      WHERE r.tags = '{}' OR r.tags IS NULL
      RETURN labels(r) AS cloud,
             r.resource_type AS type,
             COALESCE(r.arn, r.resource_id) AS resource_id,
             r.name AS name,
             'Untagged resource — missing from configuration baseline per CM-2' AS issue
      ORDER BY cloud, type
      LIMIT 100
    recommendation: >
      Enforce tagging policies via AWS Organizations. Require: owner, team,
      environment, cost-center tags on all resources. Reject untagged resource
      creation via SCPs.
    mitre: []
    references: ["https://csf.tools/reference/nist-sp-800-53/r5/cm/cm-2/"]

  - id: NIST-CM-5.1
    title: "CM-5: Access Restrictions for Change — IAM change control"
    severity: HIGH
    description: >
      NIST CM-5: The organization defines, documents, approves, and enforces
      physical and logical access restrictions associated with changes to the system.
      Principals able to modify IAM represent an unrestricted change control gap.
    cypher: |
      MATCH (p:AWSPrincipal)
      WHERE p.inline_policies CONTAINS 'iam:CreateRole'
         OR p.inline_policies CONTAINS 'iam:AttachRolePolicy'
         OR p.inline_policies CONTAINS 'iam:PutRolePolicy'
         OR p.attached_policies CONTAINS 'IAMFullAccess'
         OR p.inline_policies CONTAINS '"Action": "iam:*"'
      RETURN p.arn AS principal_arn,
             p.name AS name,
             p.principal_type AS type,
             'Principal can modify IAM — verify change control process is enforced per CM-5' AS issue
      ORDER BY p.principal_type, p.name
    recommendation: >
      Restrict IAM write permissions to a break-glass admin role with MFA condition.
      Require all IAM changes to go through an approved change management process.
      Use SCPs to prevent IAM changes outside approved accounts.
    mitre: ["T1484 - Domain Policy Modification"]
    references: ["https://csf.tools/reference/nist-sp-800-53/r5/cm/cm-5/"]

  # ── AU: Audit and Accountability ─────────────────────────────────────────

  - id: NIST-AU-6.1
    title: "AU-6: Audit Review, Analysis, and Reporting — unmonitored resources"
    severity: MEDIUM
    description: >
      NIST AU-6: The organization reviews and analyzes system audit records
      for indications of inappropriate or unusual activity. Resources without
      owner tags cannot be attributed during incident investigation.
    cypher: |
      MATCH (p:AWSPrincipal)
      WHERE (p.tags = '{}' OR p.tags IS NULL)
        AND p.principal_type IN ['User', 'Role']
      RETURN p.arn AS principal_arn,
             p.name AS name,
             p.principal_type AS type,
             'Untagged identity — cannot attribute activity during AU-6 audit review' AS issue
      ORDER BY p.principal_type, p.name
      LIMIT 100
    recommendation: >
      Apply owner, team, and purpose tags to all IAM identities. Required for
      incident attribution during audit reviews.
    mitre: []
    references: ["https://csf.tools/reference/nist-sp-800-53/r5/au/au-6/"]

  - id: NIST-AU-12.1
    title: "AU-12: Audit Record Generation — compute resource traceability"
    severity: MEDIUM
    description: >
      NIST AU-12: Provide audit record generation capability for the events
      defined in AU-2. Compute resources (Lambda, EC2) should be attributable
      to owners via tags for audit trail completeness.
    cypher: |
      MATCH (r:Resource)
      WHERE r.resource_type IN ['lambda:Function', 'ec2:Instance', 'ecs:TaskDefinition']
        AND (r.tags = '{}' OR r.tags IS NULL)
      RETURN labels(r) AS cloud,
             r.resource_type AS type,
             COALESCE(r.arn, r.resource_id) AS resource_id,
             r.name AS name,
             'Untagged compute resource — AU-12 audit trail attribution impossible' AS issue
      ORDER BY r.resource_type, r.name
      LIMIT 100
    recommendation: >
      Tag all compute resources with owner, team, and application identifiers.
      Enable CloudTrail data events for Lambda and S3.
    mitre: []
    references: ["https://csf.tools/reference/nist-sp-800-53/r5/au/au-12/"]

  # ── NIST CSF 2.0 Specific Controls ──────────────────────────────────────

  - id: NIST-CSF-GV.RM-01
    title: "GOVERN — Risk Management Strategy: identity risk posture"
    severity: LOW
    description: >
      NIST CSF 2.0 GV.RM-01: Organizational risk management priorities inform
      cybersecurity strategy. Count of privileged accounts is a key risk metric.
    cypher: |
      MATCH (p:AWSPrincipal)
      WHERE p.attached_policies CONTAINS 'AdministratorAccess'
         OR p.attached_policies CONTAINS 'PowerUserAccess'
         OR p.attached_policies CONTAINS 'IAMFullAccess'
         OR p.inline_policies CONTAINS '"Action": "*"'
      RETURN count(p) AS privileged_count,
             collect(DISTINCT p.principal_type) AS principal_types,
             'Track privileged identity count as a key risk metric per NIST CSF GV.RM-01' AS action
    recommendation: >
      Set a risk tolerance for the number of privileged accounts (recommend <5).
      Document each privileged account with business justification and review quarterly.
    mitre: []
    references: ["https://www.nist.gov/cyberframework"]

  - id: NIST-CSF-ID.AM-01
    title: "IDENTIFY — Asset Management: cloud identity inventory"
    severity: LOW
    description: >
      NIST CSF 2.0 ID.AM-01: Inventories of hardware assets, software assets,
      services, and identities are maintained. Every IAM identity must be
      documented and attributed to an owner.
    cypher: |
      MATCH (p:AWSPrincipal)
      RETURN p.principal_type AS type,
             count(p) AS count,
             sum(CASE WHEN p.tags = '{}' OR p.tags IS NULL THEN 1 ELSE 0 END) AS untagged_count,
             'Asset inventory: ' + p.principal_type + ' principals in graph' AS inventory_item
      ORDER BY count DESC
    recommendation: >
      Maintain a formal inventory of all IAM principals with owner, purpose,
      and last-review-date. Use AWS Resource Explorer or Config for automated inventory.
    mitre: []
    references: ["https://www.nist.gov/cyberframework"]

  - id: NIST-CSF-PR.AA-01
    title: "PROTECT — Identities and credentials for authorized users are managed"
    severity: MEDIUM
    description: >
      NIST CSF 2.0 PR.AA-01: IAM principals with no policies and no tags
      represent unmanaged identities that cannot be properly governed.
    cypher: |
      MATCH (p:AWSPrincipal)
      WHERE (p.attached_policy_count = 0 OR p.attached_policy_count IS NULL)
        AND (p.inline_policy_count = 0 OR p.inline_policy_count IS NULL)
        AND (p.tags = '{}' OR p.tags IS NULL)
        AND p.principal_type IN ['User', 'Role']
      RETURN p.principal_type AS type,
             p.arn AS principal,
             p.name AS name,
             'Unmanaged principal — no policies and no tags — cannot govern per PR.AA-01' AS issue
      ORDER BY p.principal_type, p.name
      LIMIT 100
    recommendation: >
      Review all zero-policy, untagged identities. Delete those no longer needed.
      Add owner tags. Assign appropriate least-privilege policies.
    mitre: ["T1078 - Valid Accounts"]
    references: ["https://www.nist.gov/cyberframework"]

  - id: NIST-CSF-PR.AA-05
    title: "PROTECT — Access permissions and authorizations are managed"
    severity: HIGH
    description: >
      NIST CSF 2.0 PR.AA-05: Principals with IAM write permissions can modify
      policies and effectively self-escalate to administrator privileges.
    cypher: |
      MATCH (p:AWSPrincipal)
      WHERE p.inline_policies CONTAINS 'iam:CreatePolicy'
         OR p.inline_policies CONTAINS 'iam:AttachRolePolicy'
         OR p.inline_policies CONTAINS 'iam:PutRolePolicy'
         OR p.attached_policies CONTAINS 'IAMFullAccess'
         OR p.inline_policies CONTAINS '"Action": "iam:*"'
      RETURN p.arn AS principal_arn,
             p.name AS name,
             p.principal_type AS type,
             'Principal can modify IAM — potential privilege escalation via PR.AA-05 violation' AS issue
      ORDER BY p.principal_type, p.name
    recommendation: >
      Restrict IAM write permissions to dedicated admin roles with MFA condition.
      Require change control approval for all IAM policy changes.
    mitre: ["T1484 - Domain Policy Modification", "T1078.004 - Cloud Accounts"]
    references: ["https://www.nist.gov/cyberframework"]

  - id: NIST-CSF-DE.CM-03
    title: "DETECT — Personnel activity and technology usage are monitored"
    severity: MEDIUM
    description: >
      NIST CSF 2.0 DE.CM-03: IAM users with no recorded console activity
      but active permissions represent a detection gap — dormant accounts
      with active permissions cannot be monitored.
    cypher: |
      MATCH (p:AWSPrincipal {principal_type: 'User'})
      WHERE NOT p.name = 'root'
        AND (p.attached_policy_count > 0 OR p.inline_policy_count > 0)
        AND (NOT p.metadata CONTAINS 'password_last_used'
             OR p.metadata CONTAINS '"password_last_used": null')
      RETURN p.arn AS user_arn,
             p.name AS username,
             p.attached_policy_count AS policies,
             'User has permissions but no recorded console activity — monitoring gap per DE.CM-03' AS issue
      ORDER BY p.name
      LIMIT 100
    recommendation: >
      Disable accounts with no login activity in 45+ days. Enable CloudWatch
      alarms on console sign-in events for all users. Review monthly.
    mitre: ["T1078.004 - Cloud Accounts"]
    references: ["https://www.nist.gov/cyberframework"]
