# NIST CSF 2.0 + NIST SP 800-53 Rev 5 — ALL CLOUDS
# Checks use generic Principal and Resource labels so they run on AWS, Azure, and GCP.
# Scoped to the current scan via scan_start_ms >= $scan_start.

framework: NIST-800-53-R5
description: >
  NIST SP 800-53 Rev 5 and NIST CSF 2.0 identity and access management controls.
  Runs on every cloud platform scanned.

checks:

  - id: NIST-AC-2.1
    title: "AC-2: Account Management — unmanaged identities with no policies or tags"
    severity: MEDIUM
    description: >
      NIST AC-2: All active identities must be managed, documented, and attributable.
      Principals with no policies and no tags cannot be governed or attributed to an owner.
    cypher: |
      MATCH (p:Principal)
      WHERE p.scan_start_ms >= $scan_start
        AND (p.attached_policy_count = 0 OR p.attached_policy_count IS NULL)
        AND (p.inline_policy_count = 0 OR p.inline_policy_count IS NULL)
        AND (p.tags = '{}' OR p.tags IS NULL OR p.tags = '')
      RETURN labels(p) AS cloud,
             COALESCE(p.arn, p.object_id, p.email) AS principal_id,
             p.name AS name,
             p.principal_type AS type,
             'Unmanaged identity — no policies and no tags; verify if still needed' AS issue
      ORDER BY cloud, type, name
      LIMIT 100
    recommendation: >
      Review all zero-policy, untagged identities quarterly. Delete unused ones.
      Add owner, team, and purpose tags. Assign appropriate least-privilege policies.
    mitre: ["T1078 - Valid Accounts"]
    references: ["https://csf.tools/reference/nist-sp-800-53/r5/ac/ac-2/"]

  - id: NIST-AC-2.2
    title: "AC-2(3): Account Management — identities with no recorded activity"
    severity: HIGH
    description: >
      NIST AC-2(3): Inactive accounts must be disabled after a defined period.
      Identities with no activity represent dormant attack surface.
    cypher: |
      MATCH (p:Principal)
      WHERE p.scan_start_ms >= $scan_start
        AND p.principal_type IN ['User', 'ServiceAccount', 'ServicePrincipal']
        AND NOT p.name = 'root'
      RETURN labels(p) AS cloud,
             COALESCE(p.arn, p.object_id, p.email) AS principal_id,
             p.name AS name,
             'Review credential report for unused credentials >90 days — disable per AC-2(3)' AS action
      ORDER BY cloud, name
      LIMIT 100
    recommendation: >
      Enforce automated disable of identities inactive for 90+ days using
      cloud-native tools (AWS Config, Azure AD Access Reviews, GCP IAM Recommender).
    mitre: ["T1078 - Valid Accounts"]
    references: ["https://csf.tools/reference/nist-sp-800-53/r5/ac/ac-2/"]

  - id: NIST-AC-3.1
    title: "AC-3: Access Enforcement — direct policy attachments on user identities"
    severity: MEDIUM
    description: >
      NIST AC-3: Access must be enforced through role-based access control.
      Permissions attached directly to individual user accounts violate RBAC principles
      and make access revocation during offboarding error-prone.
    cypher: |
      MATCH (p:Principal)
      WHERE p.scan_start_ms >= $scan_start
        AND p.principal_type = 'User'
        AND (p.attached_policy_count > 0 OR p.inline_policy_count > 0)
      RETURN labels(p) AS cloud,
             COALESCE(p.arn, p.object_id, p.email) AS principal_id,
             p.name AS name,
             COALESCE(p.attached_policy_count, 0) AS attached_policies,
             COALESCE(p.inline_policy_count, 0) AS inline_policies,
             'User has direct policy attachments — migrate to group/role-based access per AC-3' AS issue
      ORDER BY (COALESCE(p.attached_policy_count,0) + COALESCE(p.inline_policy_count,0)) DESC
      LIMIT 100
    recommendation: >
      AWS: Move user policies to IAM groups. Azure: Use Azure AD groups with RBAC roles.
      GCP: Assign roles to groups, not individual service accounts.
    mitre: ["T1078 - Valid Accounts"]
    references: ["https://csf.tools/reference/nist-sp-800-53/r5/ac/ac-3/"]

  - id: NIST-AC-5.1
    title: "AC-5: Separation of Duties — admin identities with console access"
    severity: HIGH
    description: >
      NIST AC-5: Admin accounts must be separate from daily-use accounts.
      An identity with both admin-level permissions and interactive access
      means a phished session immediately yields admin control.
    cypher: |
      MATCH (p:Principal)
      WHERE p.scan_start_ms >= $scan_start
        AND p.principal_type = 'User'
        AND (p.attached_policies CONTAINS 'AdministratorAccess'
          OR p.attached_policies CONTAINS 'Owner'
          OR p.inline_policies CONTAINS '"Action": "*"')
      RETURN labels(p) AS cloud,
             COALESCE(p.arn, p.object_id, p.email) AS principal_id,
             p.name AS name,
             'Admin-level user with interactive access — may violate separation of duties' AS issue
      ORDER BY cloud, name
      LIMIT 50
    recommendation: >
      Create dedicated admin accounts separate from daily-use accounts.
      Use privileged access workstations (PAWs) for admin operations.
      Enforce MFA and session limits on all admin accounts.
    mitre: ["T1078 - Valid Accounts", "T1548 - Abuse Elevation Control Mechanism"]
    references: ["https://csf.tools/reference/nist-sp-800-53/r5/ac/ac-5/"]

  - id: NIST-AC-6.1
    title: "AC-6: Least Privilege — identities with admin or wildcard permissions"
    severity: HIGH
    description: >
      NIST AC-6: Employ least privilege — allow only the access necessary for
      assigned tasks. Admin or wildcard permissions violate least privilege across
      all cloud platforms.
    cypher: |
      MATCH (p:Principal)
      WHERE p.scan_start_ms >= $scan_start
        AND (p.attached_policies CONTAINS 'AdministratorAccess'
          OR p.attached_policies CONTAINS 'Owner'
          OR p.attached_policies CONTAINS 'roles/owner'
          OR p.attached_policies CONTAINS 'roles/editor'
          OR p.inline_policies CONTAINS '"Action": "*"'
          OR p.inline_policies CONTAINS '"Action":["*"]')
      RETURN labels(p) AS cloud,
             COALESCE(p.arn, p.object_id, p.email) AS principal_id,
             p.name AS name,
             p.principal_type AS type,
             'Identity has admin or wildcard permissions — violates AC-6 least privilege' AS issue
      ORDER BY cloud, type, name
    recommendation: >
      Replace admin/wildcard policies with least-privilege equivalents.
      AWS: Use IAM Access Analyzer. Azure: Use Azure AD PIM.
      GCP: Use IAM Recommender to generate least-privilege replacements.
    mitre: ["T1078 - Valid Accounts", "T1548 - Abuse Elevation Control Mechanism"]
    references: ["https://csf.tools/reference/nist-sp-800-53/r5/ac/ac-6/"]

  - id: NIST-AC-6.2
    title: "AC-6(2): Least Privilege — non-admin users with elevated permissions"
    severity: MEDIUM
    description: >
      NIST AC-6(2): Users must use non-privileged accounts for general activities.
      Accounts that are not named as admin accounts but hold admin-level permissions
      suggest improper access grants without documented justification.
    cypher: |
      MATCH (p:Principal)
      WHERE p.scan_start_ms >= $scan_start
        AND p.principal_type = 'User'
        AND (p.attached_policies CONTAINS 'AdministratorAccess'
          OR p.attached_policies CONTAINS 'PowerUserAccess'
          OR p.attached_policies CONTAINS 'Owner')
        AND NOT toLower(COALESCE(p.name,'')) CONTAINS 'admin'
        AND NOT toLower(COALESCE(p.name,'')) CONTAINS 'break'
        AND NOT toLower(COALESCE(p.name,'')) CONTAINS 'svc'
      RETURN labels(p) AS cloud,
             COALESCE(p.arn, p.object_id, p.email) AS principal_id,
             p.name AS name,
             'Non-admin-named user has elevated permissions — review and document justification' AS issue
      ORDER BY cloud, name
    recommendation: >
      Document business justification for every elevated access grant.
      Use a dedicated admin account naming convention (e.g. firstname-admin).
    mitre: ["T1078 - Valid Accounts"]
    references: ["https://csf.tools/reference/nist-sp-800-53/r5/ac/ac-6/"]

  - id: NIST-AC-6.5
    title: "AC-6(5): Least Privilege — inventory of all privileged identities"
    severity: MEDIUM
    description: >
      NIST AC-6(5): Restrict privileged access and maintain an explicit inventory
      of all privileged accounts across all cloud platforms.
    cypher: |
      MATCH (p:Principal)
      WHERE p.scan_start_ms >= $scan_start
        AND (p.attached_policies CONTAINS 'AdministratorAccess'
          OR p.attached_policies CONTAINS 'PowerUserAccess'
          OR p.attached_policies CONTAINS 'IAMFullAccess'
          OR p.attached_policies CONTAINS 'Owner'
          OR p.attached_policies CONTAINS 'roles/owner'
          OR p.inline_policies CONTAINS '"Action": "*"')
      RETURN labels(p) AS cloud,
             COALESCE(p.arn, p.object_id, p.email) AS principal_id,
             p.name AS name,
             p.principal_type AS type,
             'Privileged identity — ensure documented in access inventory, reviewed quarterly' AS action
      ORDER BY cloud, type, name
    recommendation: >
      Maintain a formal inventory of all privileged accounts with owner, purpose,
      and last-review-date. Review quarterly. Require manager approval for all grants.
    mitre: ["T1078 - Valid Accounts"]
    references: ["https://csf.tools/reference/nist-sp-800-53/r5/ac/ac-6/"]

  - id: NIST-IA-2.1
    title: "IA-2: Identification and Authentication — MFA for all user identities"
    severity: HIGH
    description: >
      NIST IA-2: All user accounts accessing cloud management interfaces must use
      multi-factor authentication. This applies across AWS, Azure, and GCP.
    cypher: |
      MATCH (p:Principal)
      WHERE p.scan_start_ms >= $scan_start
        AND p.principal_type = 'User'
        AND NOT p.name = 'root'
        AND NOT p.metadata CONTAINS '"mfa_active": true'
        AND NOT p.metadata CONTAINS '"mfa_enabled": true'
        AND NOT p.metadata CONTAINS '"strong_auth": true'
      RETURN labels(p) AS cloud,
             COALESCE(p.arn, p.object_id, p.email) AS principal_id,
             p.name AS name,
             'User does not have MFA — violates IA-2 authentication requirements' AS issue
      ORDER BY cloud, name
    recommendation: >
      AWS: Enforce via SCP (aws:MultiFactorAuthPresent=true).
      Azure: Enable MFA via Conditional Access or Security Defaults.
      GCP: Enforce 2-Step Verification in Admin Console.
    mitre: ["T1078 - Valid Accounts", "T1556 - Modify Authentication Process"]
    references: ["https://csf.tools/reference/nist-sp-800-53/r5/ia/ia-2/"]

  - id: NIST-IA-2.2
    title: "IA-2(1): Identification and Authentication — MFA required for privileged accounts"
    severity: CRITICAL
    description: >
      NIST IA-2(1): MFA is mandatory for all privileged account access.
      A privileged account without MFA is a critical authentication gap that
      can lead to full cloud account compromise.
    cypher: |
      MATCH (p:Principal)
      WHERE p.scan_start_ms >= $scan_start
        AND p.principal_type = 'User'
        AND (p.attached_policies CONTAINS 'AdministratorAccess'
          OR p.attached_policies CONTAINS 'PowerUserAccess'
          OR p.attached_policies CONTAINS 'IAMFullAccess'
          OR p.attached_policies CONTAINS 'Owner')
        AND NOT p.metadata CONTAINS '"mfa_active": true'
        AND NOT p.metadata CONTAINS '"mfa_enabled": true'
      RETURN labels(p) AS cloud,
             COALESCE(p.arn, p.object_id, p.email) AS principal_id,
             p.name AS name,
             'CRITICAL: Privileged user without MFA — immediate risk of account takeover' AS issue
      ORDER BY cloud, name
    recommendation: >
      Immediately require MFA for all privileged accounts. Block console access
      without MFA using SCPs (AWS), Conditional Access (Azure), or org policies (GCP).
    mitre: ["T1078 - Valid Accounts"]
    references: ["https://csf.tools/reference/nist-sp-800-53/r5/ia/ia-2/"]

  - id: NIST-IA-5.1
    title: "IA-5: Authenticator Management — credential age and rotation"
    severity: HIGH
    description: >
      NIST IA-5: Authenticators (access keys, passwords, service account keys)
      must have defined lifetimes and rotation requirements.
    cypher: |
      MATCH (p:Principal)
      WHERE p.scan_start_ms >= $scan_start
        AND p.principal_type IN ['User', 'ServiceAccount']
        AND p.metadata CONTAINS 'key'
      RETURN labels(p) AS cloud,
             COALESCE(p.arn, p.object_id, p.email) AS principal_id,
             p.name AS name,
             'Verify credential age via cloud console — rotate any key older than 90 days' AS action
      ORDER BY cloud, name
      LIMIT 100
    recommendation: >
      AWS: Rotate access keys every 90 days. Use Config rule access-keys-rotated.
      Azure: Rotate service principal secrets and certificates annually.
      GCP: Rotate service account keys every 90 days. Prefer Workload Identity.
    mitre: ["T1078 - Valid Accounts", "T1098.001 - Additional Cloud Credentials"]
    references: ["https://csf.tools/reference/nist-sp-800-53/r5/ia/ia-5/"]

  - id: NIST-IA-5.2
    title: "IA-5(1): Authenticator Management — password complexity"
    severity: MEDIUM
    description: >
      NIST IA-5(1): Password-based authenticators must enforce minimum complexity.
      Verify the cloud platform's password policy meets NIST requirements.
    cypher: |
      MATCH (p:Principal)
      WHERE p.scan_start_ms >= $scan_start
        AND p.principal_type = 'User'
      WITH labels(p) AS cloud, count(p) AS user_count
      WHERE user_count > 0
      RETURN cloud,
             user_count,
             'Manual check: verify password policy requires 14+ chars with complexity per IA-5(1)' AS action
      ORDER BY cloud
    recommendation: >
      AWS: IAM Account Settings → Password Policy (14+ chars, complexity, no reuse).
      Azure: Conditional Access → Authentication strengths.
      GCP: Admin Console → Security → Password management.
    mitre: ["T1110 - Brute Force"]
    references: ["https://csf.tools/reference/nist-sp-800-53/r5/ia/ia-5/"]

  - id: NIST-CM-2.1
    title: "CM-2: Baseline Configuration — untagged resources missing from inventory"
    severity: LOW
    description: >
      NIST CM-2: A current baseline configuration must be maintained. Resources
      without tags cannot be included in a configuration baseline or inventory.
    cypher: |
      MATCH (r:Resource)
      WHERE r.scan_start_ms >= $scan_start
        AND (r.tags = '{}' OR r.tags IS NULL OR r.tags = '')
      RETURN labels(r) AS cloud,
             r.resource_type AS type,
             COALESCE(r.arn, r.resource_id) AS resource_id,
             r.name AS name,
             r.region AS region,
             'Untagged resource — missing from configuration baseline per CM-2' AS issue
      ORDER BY cloud, type
      LIMIT 100
    recommendation: >
      Enforce mandatory tagging via AWS Tag Policies, Azure Policy, or GCP Org Constraints.
      Required tags: owner, team, environment, cost-center.
    mitre: []
    references: ["https://csf.tools/reference/nist-sp-800-53/r5/cm/cm-2/"]

  - id: NIST-CM-5.1
    title: "CM-5: Access Restrictions for Change — identities that can modify IAM"
    severity: HIGH
    description: >
      NIST CM-5: Access restrictions must be enforced for changes to the system.
      Identities able to modify IAM policies can grant themselves any permission,
      bypassing all other access controls.
    cypher: |
      MATCH (p:Principal)
      WHERE p.scan_start_ms >= $scan_start
        AND (p.inline_policies CONTAINS 'iam:CreatePolicy'
          OR p.inline_policies CONTAINS 'iam:AttachRolePolicy'
          OR p.inline_policies CONTAINS 'iam:PutRolePolicy'
          OR p.attached_policies CONTAINS 'IAMFullAccess'
          OR p.inline_policies CONTAINS '"Action": "iam:*"'
          OR p.attached_policies CONTAINS 'User Access Administrator'
          OR p.attached_policies CONTAINS 'roles/iam.admin')
      RETURN labels(p) AS cloud,
             COALESCE(p.arn, p.object_id, p.email) AS principal_id,
             p.name AS name,
             p.principal_type AS type,
             'Identity can modify IAM — potential privilege escalation; enforce change control' AS issue
      ORDER BY cloud, type, name
    recommendation: >
      Restrict IAM write permissions to dedicated admin roles with MFA conditions.
      Require change control approval for all IAM policy changes.
      Use SCPs/Org Policies to prevent IAM changes outside approved accounts.
    mitre: ["T1484 - Domain Policy Modification"]
    references: ["https://csf.tools/reference/nist-sp-800-53/r5/cm/cm-5/"]

  - id: NIST-AU-6.1
    title: "AU-6: Audit Review — identities with no tags cannot be attributed"
    severity: MEDIUM
    description: >
      NIST AU-6: Audit records must be reviewed for inappropriate activity.
      Identities without owner tags cannot be attributed to individuals during
      incident investigation.
    cypher: |
      MATCH (p:Principal)
      WHERE p.scan_start_ms >= $scan_start
        AND (p.tags = '{}' OR p.tags IS NULL OR p.tags = '')
        AND p.principal_type IN ['User', 'Role', 'ServiceAccount', 'ServicePrincipal']
      RETURN labels(p) AS cloud,
             COALESCE(p.arn, p.object_id, p.email) AS principal_id,
             p.name AS name,
             p.principal_type AS type,
             'Untagged identity — cannot attribute activity during AU-6 audit review' AS issue
      ORDER BY cloud, type, name
      LIMIT 100
    recommendation: >
      Apply owner, team, and purpose tags to all cloud identities.
      This is required for incident attribution during audit reviews.
    mitre: []
    references: ["https://csf.tools/reference/nist-sp-800-53/r5/au/au-6/"]

  - id: NIST-AU-12.1
    title: "AU-12: Audit Record Generation — untagged compute resources"
    severity: MEDIUM
    description: >
      NIST AU-12: All system components must generate audit records.
      Untagged compute resources cannot be attributed to owners or included
      in audit trail analysis.
    cypher: |
      MATCH (r:Resource)
      WHERE r.scan_start_ms >= $scan_start
        AND r.resource_type IN [
          'lambda:Function', 'ec2:Instance', 'ecs:TaskDefinition',
          'eks:Cluster', 'Microsoft.Web/sites', 'Microsoft.Compute/virtualMachines',
          'Microsoft.ContainerService/managedClusters',
          'container:Cluster', 'run:Service', 'cloudfunctions:Function',
          'sqladmin:Instance'
        ]
        AND (r.tags = '{}' OR r.tags IS NULL OR r.tags = '')
      RETURN labels(r) AS cloud,
             r.resource_type AS type,
             COALESCE(r.arn, r.resource_id) AS resource_id,
             r.name AS name,
             r.region AS region,
             'Untagged compute resource — AU-12 audit trail attribution impossible' AS issue
      ORDER BY cloud, r.resource_type, r.name
      LIMIT 100
    recommendation: >
      Tag all compute resources with owner, team, and application identifiers.
      Enable cloud-native audit logging (CloudTrail, Azure Monitor, GCP Cloud Audit Logs).
    mitre: []
    references: ["https://csf.tools/reference/nist-sp-800-53/r5/au/au-12/"]

  - id: NIST-CSF-GV.RM-01
    title: "GOVERN — Risk Management: privileged identity count"
    severity: LOW
    description: >
      NIST CSF 2.0 GV.RM-01: The count of privileged identities is a key risk metric
      that must be tracked and kept within organisation-defined thresholds.
    cypher: |
      MATCH (p:Principal)
      WHERE p.scan_start_ms >= $scan_start
        AND (p.attached_policies CONTAINS 'AdministratorAccess'
          OR p.attached_policies CONTAINS 'PowerUserAccess'
          OR p.attached_policies CONTAINS 'IAMFullAccess'
          OR p.attached_policies CONTAINS 'Owner'
          OR p.attached_policies CONTAINS 'roles/owner'
          OR p.inline_policies CONTAINS '"Action": "*"')
      RETURN labels(p) AS cloud,
             count(p) AS privileged_count,
             'Track privileged identity count as a key risk metric per GV.RM-01' AS action
      ORDER BY cloud
    recommendation: >
      Set a risk tolerance for the number of privileged identities per cloud (recommend <5).
      Document each with business justification, approver, and review date.
    mitre: []
    references: ["https://www.nist.gov/cyberframework"]

  - id: NIST-CSF-ID.AM-01
    title: "IDENTIFY — Asset Management: cloud identity inventory"
    severity: LOW
    description: >
      NIST CSF 2.0 ID.AM-01: All cloud identities must be inventoried with
      documented owners and purposes.
    cypher: |
      MATCH (p:Principal)
      WHERE p.scan_start_ms >= $scan_start
      RETURN labels(p) AS cloud,
             p.principal_type AS type,
             count(p) AS count,
             sum(CASE WHEN p.tags = '{}' OR p.tags IS NULL THEN 1 ELSE 0 END) AS untagged_count,
             'Identity asset inventory — untagged identities lack owner attribution' AS action
      ORDER BY cloud, type
    recommendation: >
      Maintain a formal identity inventory. Use cloud-native discovery tools
      (AWS IAM Access Advisor, Azure AD Access Reviews, GCP IAM Recommender).
    mitre: []
    references: ["https://www.nist.gov/cyberframework"]

  - id: NIST-CSF-PR.AA-01
    title: "PROTECT — Identity governance: unmanaged identities with no policies"
    severity: MEDIUM
    description: >
      NIST CSF 2.0 PR.AA-01: All identities must be managed. Principals with
      no policies and no tags cannot be governed.
    cypher: |
      MATCH (p:Principal)
      WHERE p.scan_start_ms >= $scan_start
        AND (p.attached_policy_count = 0 OR p.attached_policy_count IS NULL)
        AND (p.inline_policy_count = 0 OR p.inline_policy_count IS NULL)
        AND (p.tags = '{}' OR p.tags IS NULL OR p.tags = '')
        AND p.principal_type IN ['User', 'Role', 'ServiceAccount', 'ServicePrincipal']
      RETURN labels(p) AS cloud,
             COALESCE(p.arn, p.object_id, p.email) AS principal_id,
             p.name AS name,
             p.principal_type AS type,
             'Unmanaged identity — no policies and no tags; cannot govern per PR.AA-01' AS issue
      ORDER BY cloud, type, name
      LIMIT 100
    recommendation: >
      Delete unused identities. Add owner tags. Assign appropriate least-privilege policies.
      Implement a joiner-mover-leaver process across all cloud platforms.
    mitre: ["T1078 - Valid Accounts"]
    references: ["https://www.nist.gov/cyberframework"]

  - id: NIST-CSF-PR.AA-05
    title: "PROTECT — Access permissions: identities that can modify IAM"
    severity: HIGH
    description: >
      NIST CSF 2.0 PR.AA-05: Identities with IAM write permissions can grant
      themselves any permission, effectively bypassing all access controls.
    cypher: |
      MATCH (p:Principal)
      WHERE p.scan_start_ms >= $scan_start
        AND (p.inline_policies CONTAINS 'iam:CreatePolicy'
          OR p.inline_policies CONTAINS 'iam:AttachRolePolicy'
          OR p.inline_policies CONTAINS 'iam:PutRolePolicy'
          OR p.attached_policies CONTAINS 'IAMFullAccess'
          OR p.inline_policies CONTAINS '"Action": "iam:*"'
          OR p.attached_policies CONTAINS 'User Access Administrator'
          OR p.attached_policies CONTAINS 'roles/iam.admin')
      RETURN labels(p) AS cloud,
             COALESCE(p.arn, p.object_id, p.email) AS principal_id,
             p.name AS name,
             p.principal_type AS type,
             'Identity can modify IAM — potential privilege escalation per PR.AA-05' AS issue
      ORDER BY cloud, type, name
    recommendation: >
      Restrict IAM write permissions to break-glass admin roles with MFA conditions.
      Audit all IAM changes via CloudTrail/Azure Monitor/GCP Audit Logs.
    mitre: ["T1484 - Domain Policy Modification", "T1078 - Valid Accounts"]
    references: ["https://www.nist.gov/cyberframework"]

  - id: NIST-CSF-DE.CM-03
    title: "DETECT — Activity monitoring: users with permissions but no activity"
    severity: MEDIUM
    description: >
      NIST CSF 2.0 DE.CM-03: Identities with permissions but no recorded activity
      represent a detection gap — dormant accounts with active permissions.
    cypher: |
      MATCH (p:Principal)
      WHERE p.scan_start_ms >= $scan_start
        AND p.principal_type = 'User'
        AND NOT p.name = 'root'
        AND (p.attached_policy_count > 0 OR p.inline_policy_count > 0)
        AND (NOT p.metadata CONTAINS 'last_used'
          OR p.metadata CONTAINS '"last_used": null')
      RETURN labels(p) AS cloud,
             COALESCE(p.arn, p.object_id, p.email) AS principal_id,
             p.name AS name,
             COALESCE(p.attached_policy_count, 0) AS policies,
             'User has permissions but no recorded activity — monitoring gap per DE.CM-03' AS issue
      ORDER BY cloud, name
      LIMIT 100
    recommendation: >
      Disable accounts with no login activity for 45+ days.
      Enable alerting on first-time logins and unusual access patterns.
    mitre: ["T1078 - Valid Accounts"]
    references: ["https://www.nist.gov/cyberframework"]
