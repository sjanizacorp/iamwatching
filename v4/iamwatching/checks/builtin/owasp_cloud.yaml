# OWASP Cloud-Native Application Security Top 10 (2024) — ALL CLOUDS
# Uses generic Principal/Resource labels — runs on AWS, Azure, and GCP.
# Scoped to current scan via scan_start_ms >= $scan_start.

framework: OWASP-CLOUD-NATIVE-2024
description: >
  OWASP Cloud-Native Application Security Top 10 — all 10 risks.
  Runs on every cloud platform scanned.

checks:

  - id: OWASP-CNAS-1B
    title: "CNAS-1: Insecure Config — wildcard or admin policies on any identity"
    severity: CRITICAL
    description: >
      OWASP CNAS-1: Misconfigured cloud services are the leading cause of breaches.
      Any identity with wildcard actions or admin-level policies is a critical misconfiguration.
    cypher: |
      MATCH (p:Principal)
      WHERE p.scan_start_ms >= $scan_start
        AND (p.inline_policies CONTAINS '"Action": "*"'
          OR p.inline_policies CONTAINS '"Action":["*"]'
          OR p.attached_policies CONTAINS 'AdministratorAccess'
          OR p.attached_policies CONTAINS 'roles/owner'
          OR p.attached_policies CONTAINS 'Owner'
          OR p.inline_policies CONTAINS '"Action": "iam:*"')
      RETURN labels(p) AS cloud,
             COALESCE(p.arn, p.object_id, p.email) AS principal_id,
             p.name AS name,
             p.principal_type AS type,
             'Identity has admin or wildcard permissions — critical misconfiguration' AS issue
      ORDER BY cloud, type, name
    recommendation: >
      Replace admin/wildcard policies with least-privilege equivalents scoped to
      specific actions and resources. Use IAM Access Analyzer, Azure AD PIM,
      or GCP IAM Recommender to generate replacements.
    mitre: ["T1078 - Valid Accounts", "T1548 - Abuse Elevation Control Mechanism"]
    references: ["https://owasp.org/www-project-cloud-native-application-security-top-10/"]

  - id: OWASP-CNAS-2B
    title: "CNAS-2: Broken Authentication — service identities with admin permissions"
    severity: HIGH
    description: >
      OWASP CNAS-2: Service accounts, execution roles, and managed identities with
      excessive permissions mean a code execution flaw yields full cloud account control.
    cypher: |
      MATCH (p:Principal)
      WHERE p.scan_start_ms >= $scan_start
        AND p.principal_type IN ['Role', 'ServiceAccount', 'ServicePrincipal']
        AND (p.attached_policies CONTAINS 'AdministratorAccess'
          OR p.attached_policies CONTAINS 'roles/owner'
          OR p.attached_policies CONTAINS 'Owner'
          OR p.inline_policies CONTAINS '"Action": "*"')
      RETURN labels(p) AS cloud,
             COALESCE(p.arn, p.object_id, p.email) AS principal_id,
             p.name AS name,
             p.principal_type AS type,
             'Service identity has admin-level permissions — high lateral movement risk' AS issue
      ORDER BY cloud, type, name
    recommendation: >
      Apply task-specific least-privilege roles to all service identities.
      Never attach admin policies to execution roles, managed identities, or service accounts.
    mitre: ["T1078 - Valid Accounts", "T1610 - Deploy Container"]
    references: ["https://owasp.org/www-project-cloud-native-application-security-top-10/"]

  - id: OWASP-CNAS-3B
    title: "CNAS-3: Insecure Third-Party Dependencies — broad external trust"
    severity: HIGH
    description: >
      OWASP CNAS-3: Identities with broad trust policies (wildcard principals, cross-account
      without conditions) create supply chain risk that can be exploited by third parties.
    cypher: |
      MATCH (p:Principal)
      WHERE p.scan_start_ms >= $scan_start
        AND p.principal_type IN ['Role', 'ServicePrincipal']
        AND (p.metadata CONTAINS '"Principal": "*"'
          OR (p.metadata CONTAINS '"AWS":' AND p.metadata CONTAINS ':root"')
          OR p.metadata CONTAINS '"Federated"')
      RETURN labels(p) AS cloud,
             COALESCE(p.arn, p.object_id, p.email) AS principal_id,
             p.name AS name,
             'Identity trust policy may allow broad or cross-account access — review immediately' AS issue
      ORDER BY cloud, name
      LIMIT 50
    recommendation: >
      Add Condition blocks (aws:PrincipalOrgID, ExternalId) to all cross-account trusts.
      Review all federated identity providers quarterly.
    mitre: ["T1199 - Trusted Relationship"]
    references: ["https://owasp.org/www-project-cloud-native-application-security-top-10/"]

  - id: OWASP-CNAS-4
    title: "CNAS-4: Improper Asset Scope — identities with no policies"
    severity: MEDIUM
    description: >
      OWASP CNAS-4: Identities with zero permissions represent dormant attack surface
      with no documented purpose. They should be reviewed and removed.
    cypher: |
      MATCH (p:Principal)
      WHERE p.scan_start_ms >= $scan_start
        AND (p.attached_policy_count = 0 OR p.attached_policy_count IS NULL)
        AND (p.inline_policy_count = 0 OR p.inline_policy_count IS NULL)
        AND p.principal_type IN ['User', 'Role', 'ServiceAccount', 'ServicePrincipal']
      RETURN labels(p) AS cloud,
             COALESCE(p.arn, p.object_id, p.email) AS principal_id,
             p.name AS name,
             p.principal_type AS type,
             'Identity has no policies — review if still needed or delete' AS issue
      ORDER BY cloud, type, name
      LIMIT 50
    recommendation: >
      Delete all unused identities. Implement quarterly access reviews.
      Deny creation of new identities without documented owner and purpose.
    mitre: ["T1078 - Valid Accounts"]
    references: ["https://owasp.org/www-project-cloud-native-application-security-top-10/"]

  - id: OWASP-CNAS-5
    title: "CNAS-5: Inadequate Logging — resources with no tags for monitoring"
    severity: MEDIUM
    description: >
      OWASP CNAS-5: Without tags, resources cannot be monitored or attributed in
      incident response. All cloud resources need owner tags for adequate logging.
    cypher: |
      MATCH (r:Resource)
      WHERE r.scan_start_ms >= $scan_start
        AND (r.tags = '{}' OR r.tags IS NULL OR r.tags = '')
      RETURN labels(r) AS cloud,
             r.resource_type AS resource_type,
             COALESCE(r.arn, r.resource_id) AS resource_id,
             r.name AS name,
             r.region AS region,
             'Resource has no tags — monitoring and attribution impossible' AS issue
      ORDER BY cloud, resource_type
      LIMIT 100
    recommendation: >
      Enforce mandatory tagging (owner, team, environment) via cloud-native policy tools.
      Resources without owner tags cannot be attributed during security incidents.
    mitre: ["T1562 - Impair Defenses"]
    references: ["https://owasp.org/www-project-cloud-native-application-security-top-10/"]

  - id: OWASP-CNAS-6
    title: "CNAS-6: Credentials in Compute Environment Variables"
    severity: CRITICAL
    description: >
      OWASP CNAS-6: Hardcoded secrets in Lambda, Azure Functions, Cloud Functions,
      or other compute environment variables are exposed to any principal with
      read access. This is a leading cause of cloud credential theft.
    cypher: |
      MATCH (r:Resource)
      WHERE r.scan_start_ms >= $scan_start
        AND r.has_env_vars = true
      RETURN labels(r) AS cloud,
             r.resource_type AS resource_type,
             COALESCE(r.arn, r.resource_id) AS resource_id,
             r.name AS name,
             r.region AS region,
             'Compute resource has environment variables — scan for embedded secrets' AS issue
      ORDER BY cloud, r.resource_type, r.name
      LIMIT 100
    recommendation: >
      AWS: Use Secrets Manager or Parameter Store. Azure: Use Key Vault references.
      GCP: Use Secret Manager. Remove all secrets from environment variables.
    mitre: ["T1552.001 - Credentials In Files", "T1552.005 - Cloud Instance Metadata API"]
    references: ["https://owasp.org/www-project-cloud-native-application-security-top-10/"]

  - id: OWASP-CNAS-6B
    title: "CNAS-6: Verified live cross-cloud credential leakage"
    severity: CRITICAL
    description: >
      OWASP CNAS-6 (verified): A credential from one cloud was found embedded in
      another cloud's compute resource and confirmed as still-active.
    cypher: |
      MATCH (r:Resource)
      WHERE r.scan_start_ms >= $scan_start
      OPTIONAL MATCH (r)-[e:CROSS_CLOUD_LINK]->(tgt)
        WHERE e.verified = true
      WITH r, collect(e) AS live_links, count(e) AS live_count
      WHERE live_count > 0
      RETURN labels(r) AS cloud,
             COALESCE(r.arn, r.resource_id) AS resource_id,
             r.resource_type AS type,
             live_count AS live_credentials,
             'VERIFIED LIVE: active credential from another cloud found in this resource' AS issue
      ORDER BY live_count DESC
    recommendation: >
      IMMEDIATE ACTION: Rotate the leaked credentials. Remove from compute resource.
      Investigate CloudTrail/audit logs for unauthorized usage. Move to secrets manager.
    mitre: ["T1552.001 - Credentials In Files", "T1078 - Valid Accounts"]
    references: ["https://owasp.org/www-project-cloud-native-application-security-top-10/"]

  - id: OWASP-CNAS-7
    title: "CNAS-7: Insecure Network Controls — publicly accessible storage"
    severity: HIGH
    description: >
      OWASP CNAS-7: Object storage (S3, Blob, GCS) with public access policies
      exposes data to the entire internet. Public storage has caused major breaches.
    cypher: |
      MATCH (r:Resource)
      WHERE r.scan_start_ms >= $scan_start
        AND r.public_access = true
        AND r.resource_type IN [
          's3:Bucket',
          'Microsoft.Storage/storageAccounts',
          'storage:Bucket'
        ]
      RETURN labels(r) AS cloud,
             COALESCE(r.arn, r.resource_id) AS resource_id,
             r.name AS name,
             r.region AS region,
             'Storage resource is publicly accessible — data exposed to internet' AS issue
      ORDER BY cloud, r.name
    recommendation: >
      AWS: Enable S3 Block Public Access at account level. Azure: Set allowBlobPublicAccess=false.
      GCP: Enable Public Access Prevention via Org Policy. Audit all public buckets immediately.
    mitre: ["T1530 - Data from Cloud Storage"]
    references: ["https://owasp.org/www-project-cloud-native-application-security-top-10/"]

  - id: OWASP-CNAS-8
    title: "CNAS-8: Container Escape — compute resources with credentials in env vars"
    severity: HIGH
    description: >
      OWASP CNAS-8: Containers and serverless functions with hardcoded credentials
      or excessive IAM permissions mean a container escape immediately yields
      cloud account access.
    cypher: |
      MATCH (r:Resource)
      WHERE r.scan_start_ms >= $scan_start
        AND r.resource_type IN [
          'ecs:TaskDefinition', 'lambda:Function', 'eks:Cluster',
          'Microsoft.Web/sites', 'Microsoft.ContainerService/managedClusters',
          'container:Cluster', 'run:Service', 'cloudfunctions:Function'
        ]
        AND r.has_env_vars = true
      RETURN labels(r) AS cloud,
             r.resource_type AS type,
             COALESCE(r.arn, r.resource_id) AS resource_id,
             r.name AS name,
             r.region AS region,
             'Container/serverless has env vars — scan for embedded credentials' AS issue
      ORDER BY cloud, r.resource_type, r.name
      LIMIT 50
    recommendation: >
      Remove all credentials from environment variables. Use execution roles (AWS),
      Managed Identity (Azure), or Workload Identity (GCP) for service-to-service auth.
    mitre: ["T1611 - Escape to Host", "T1552.001 - Credentials In Files"]
    references: ["https://owasp.org/www-project-cloud-native-application-security-top-10/"]

  - id: OWASP-CNAS-9
    title: "CNAS-9: Using Components With Known Vulnerabilities — unencrypted resources"
    severity: MEDIUM
    description: >
      OWASP CNAS-9: Resources without encryption at rest represent an exploitable
      vulnerability — any physical or logical access to the underlying storage
      exposes data. Encryption is a fundamental security baseline.
    cypher: |
      MATCH (r:Resource)
      WHERE r.scan_start_ms >= $scan_start
        AND (r.encrypted = false OR r.encrypted IS NULL)
        AND r.resource_type IN [
          'rds:DBInstance', 'dynamodb:Table', 'redshift:Cluster',
          'elasticache:Cluster', 'kinesis:Stream',
          'Microsoft.Sql/servers/databases', 'Microsoft.DocumentDB/databaseAccounts',
          'sqladmin:Instance', 'bigquery:Dataset'
        ]
      RETURN labels(r) AS cloud,
             r.resource_type AS type,
             COALESCE(r.arn, r.resource_id) AS resource_id,
             r.name AS name,
             r.region AS region,
             'Database or stream resource not encrypted at rest — enable encryption' AS issue
      ORDER BY cloud, r.resource_type, r.name
      LIMIT 100
    recommendation: >
      Enable encryption at rest with customer-managed keys on all databases and streams.
      Encrypt-at-rest is required by GDPR, HIPAA, PCI DSS, and SOC 2.
    mitre: ["T1005 - Data from Local System"]
    references: ["https://owasp.org/www-project-cloud-native-application-security-top-10/"]

  - id: OWASP-CNAS-10
    title: "CNAS-10: Insufficient Resource Quotas — publicly accessible compute"
    severity: MEDIUM
    description: >
      OWASP CNAS-10: Compute resources with public network access are exposed to
      denial-of-service, credential attacks, and exploitation of vulnerabilities.
    cypher: |
      MATCH (r:Resource)
      WHERE r.scan_start_ms >= $scan_start
        AND r.public_access = true
        AND r.resource_type IN [
          'rds:DBInstance', 'redshift:Cluster', 'elasticache:Cluster',
          'Microsoft.Sql/servers', 'Microsoft.DocumentDB/databaseAccounts',
          'sqladmin:Instance'
        ]
      RETURN labels(r) AS cloud,
             r.resource_type AS type,
             COALESCE(r.arn, r.resource_id) AS resource_id,
             r.name AS name,
             r.region AS region,
             'Database publicly accessible — disable and use private connectivity' AS issue
      ORDER BY cloud, r.resource_type, r.name
    recommendation: >
      Disable public access on all databases. Use VPC endpoints, private link,
      or VPN for access. Place databases in private subnets only.
    mitre: ["T1190 - Exploit Public-Facing Application"]
    references: ["https://owasp.org/www-project-cloud-native-application-security-top-10/"]
