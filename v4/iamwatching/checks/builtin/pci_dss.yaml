# PCI DSS v4.0.1 — IAM Requirements — ALL CLOUDS
# Uses generic Principal/Resource labels — runs on AWS, Azure, and GCP.

framework: PCI-DSS-4.0
description: >
  PCI DSS v4.0.1 identity and access management requirements 7 and 8.
  Runs on every cloud platform scanned.

checks:

  - id: PCI-REQ-7.2.1
    title: "PCI 7.2.1: Least privilege access — admin or wildcard permissions"
    severity: HIGH
    description: >
      PCI DSS Req 7.2.1: Access to system components is restricted to only those
      individuals whose job requires such access. Admin or wildcard permissions
      violate this requirement on any cloud platform.
    cypher: |
      MATCH (p:Principal)
      WHERE p.scan_start_ms >= $scan_start
        AND (p.attached_policies CONTAINS 'AdministratorAccess'
          OR p.attached_policies CONTAINS 'Owner'
          OR p.attached_policies CONTAINS 'roles/owner'
          OR p.attached_policies CONTAINS 'PowerUserAccess'
          OR p.inline_policies CONTAINS '"Action": "*"')
      RETURN labels(p) AS cloud,
             COALESCE(p.arn, p.object_id, p.email) AS principal_id,
             p.name AS name,
             p.principal_type AS type,
             'PCI 7.2.1: Admin/wildcard access violates least privilege requirement' AS issue
      ORDER BY cloud, type, name
    recommendation: >
      Define access policies based on job function. Remove all wildcard and admin
      permissions. Document business justification for any elevated access.
    mitre: ["T1078 - Valid Accounts"]
    references: ["https://www.pcisecuritystandards.org/document_library/"]

  - id: PCI-REQ-7.2.4
    title: "PCI 7.2.4: User accounts reviewed at least every 6 months"
    severity: MEDIUM
    description: >
      PCI DSS Req 7.2.4: All user accounts and access privileges must be reviewed
      at least once every 6 months across all cloud platforms.
    cypher: |
      MATCH (p:Principal)
      WHERE p.scan_start_ms >= $scan_start
        AND p.principal_type IN ['User', 'ServiceAccount', 'ServicePrincipal']
      RETURN labels(p) AS cloud,
             COALESCE(p.arn, p.object_id, p.email) AS principal_id,
             p.name AS name,
             p.tags AS tags,
             'PCI 7.2.4: Verify this account was reviewed within the last 6 months' AS action
      ORDER BY cloud, name
      LIMIT 100
    recommendation: >
      Implement semi-annual access reviews across all cloud platforms.
      Use tag last_reviewed_date to track review status. Disable unreviewed accounts.
    mitre: ["T1078 - Valid Accounts"]
    references: ["https://www.pcisecuritystandards.org/document_library/"]

  - id: PCI-REQ-8.2.1
    title: "PCI 8.2.1: Unique IDs — no shared or generic account names"
    severity: HIGH
    description: >
      PCI DSS Req 8.2.1: All users must have a unique ID before accessing
      system components. Shared or generic accounts prevent individual accountability.
    cypher: |
      MATCH (p:Principal)
      WHERE p.scan_start_ms >= $scan_start
        AND p.principal_type = 'User'
        AND toLower(COALESCE(p.name,'')) IN [
          'admin', 'administrator', 'root', 'user', 'test',
          'guest', 'service', 'shared', 'common', 'default', 'generic'
        ]
      RETURN labels(p) AS cloud,
             COALESCE(p.arn, p.object_id, p.email) AS principal_id,
             p.name AS username,
             'PCI 8.2.1: Generic/shared account name — violates unique identity requirement' AS issue
      ORDER BY cloud, p.name
    recommendation: >
      Replace all generic/shared accounts with individually named accounts.
      Each account must be attributable to a single named person or service.
    mitre: ["T1078 - Valid Accounts"]
    references: ["https://www.pcisecuritystandards.org/document_library/"]

  - id: PCI-REQ-8.3.4
    title: "PCI 8.3.4: Password complexity — 12+ character minimum"
    severity: MEDIUM
    description: >
      PCI DSS Req 8.3.4: Passwords must have a minimum of 12 characters
      (PCI v4.0.1 raised this from 8). Verify the password policy on all clouds.
    cypher: |
      MATCH (p:Principal)
      WHERE p.scan_start_ms >= $scan_start
        AND p.principal_type = 'User'
      WITH labels(p) AS cloud, count(p) AS user_count
      WHERE user_count > 0
      RETURN cloud,
             user_count,
             'PCI 8.3.4: Manual check — verify password policy requires 12+ characters' AS action
      ORDER BY cloud
    recommendation: >
      AWS: IAM Account Settings — set minimum 14 (exceeds PCI minimum).
      Azure: Azure AD Password Protection — configure custom banned password list.
      GCP: Admin Console — enforce 2SV and password length requirements.
    mitre: ["T1110 - Brute Force"]
    references: ["https://www.pcisecuritystandards.org/document_library/"]

  - id: PCI-REQ-8.3.9
    title: "PCI 8.3.9: Passwords changed every 90 days for non-MFA users"
    severity: HIGH
    description: >
      PCI DSS Req 8.3.9: For users without MFA, passwords must be changed at least
      once every 90 days. The secure fix is to enable MFA for all users.
    cypher: |
      MATCH (p:Principal)
      WHERE p.scan_start_ms >= $scan_start
        AND p.principal_type = 'User'
        AND NOT p.name = 'root'
        AND NOT p.metadata CONTAINS '"mfa_active": true'
        AND NOT p.metadata CONTAINS '"mfa_enabled": true'
        AND NOT p.metadata CONTAINS '"strong_auth": true'
      RETURN labels(p) AS cloud,
             COALESCE(p.arn, p.object_id, p.email) AS principal_id,
             p.name AS name,
             'PCI 8.3.9: User without MFA — password must be rotated every 90 days' AS issue
      ORDER BY cloud, p.name
    recommendation: >
      Enable MFA for all users (eliminates the 90-day rotation requirement).
      Or enforce 90-day password expiry via platform password policies.
    mitre: ["T1078 - Valid Accounts"]
    references: ["https://www.pcisecuritystandards.org/document_library/"]

  - id: PCI-REQ-8.4.2
    title: "PCI 8.4.2: MFA required for all access — users without MFA"
    severity: CRITICAL
    description: >
      PCI DSS Req 8.4.2: MFA must be implemented for all access to the cardholder
      data environment. All user identities across all clouds must have MFA enabled.
    cypher: |
      MATCH (p:Principal)
      WHERE p.scan_start_ms >= $scan_start
        AND p.principal_type = 'User'
        AND NOT p.name = 'root'
        AND NOT p.metadata CONTAINS '"mfa_active": true'
        AND NOT p.metadata CONTAINS '"mfa_enabled": true'
        AND NOT p.metadata CONTAINS '"strong_auth": true'
      RETURN labels(p) AS cloud,
             COALESCE(p.arn, p.object_id, p.email) AS principal_id,
             p.name AS name,
             'PCI 8.4.2 CRITICAL: User has no MFA — all CDE access requires MFA' AS issue
      ORDER BY cloud, p.name
    recommendation: >
      Enforce MFA for all users immediately. This is a PCI compliance blocking finding.
      AWS: SCP deny without MFA. Azure: Conditional Access. GCP: Org Policy.
    mitre: ["T1078 - Valid Accounts"]
    references: ["https://www.pcisecuritystandards.org/document_library/"]

  - id: PCI-REQ-8.6.1
    title: "PCI 8.6.1: Service account naming and documentation"
    severity: MEDIUM
    description: >
      PCI DSS Req 8.6.1: System/application accounts must be managed with documented
      owners. Service accounts without a clear naming convention are unattributable.
    cypher: |
      MATCH (p:Principal)
      WHERE p.scan_start_ms >= $scan_start
        AND p.principal_type IN ['ServiceAccount', 'ServicePrincipal', 'User']
        AND NOT toLower(COALESCE(p.name,'')) STARTS WITH 'svc-'
        AND NOT toLower(COALESCE(p.name,'')) STARTS WITH 'app-'
        AND NOT toLower(COALESCE(p.name,'')) STARTS WITH 'service-'
        AND NOT toLower(COALESCE(p.name,'')) STARTS WITH 'sa-'
        AND (p.attached_policy_count > 0 OR p.inline_policy_count > 0)
        AND NOT p.metadata CONTAINS 'password_last_used'
        AND NOT p.metadata CONTAINS 'mfa_active'
      RETURN labels(p) AS cloud,
             COALESCE(p.arn, p.object_id, p.email) AS principal_id,
             p.name AS name,
             p.principal_type AS type,
             'Possible service account without naming convention — PCI 8.6.1 requires documentation' AS issue
      ORDER BY cloud, type, name
      LIMIT 50
    recommendation: >
      Use naming convention svc-<service>-<env> for all service accounts across clouds.
      Document owner, purpose, and last review date via tags.
    mitre: ["T1078 - Valid Accounts"]
    references: ["https://www.pcisecuritystandards.org/document_library/"]

  - id: PCI-REQ-DATA-ENC
    title: "PCI Data Protection: unencrypted databases storing cardholder data"
    severity: CRITICAL
    description: >
      PCI DSS Requirement 3: Protect stored account data. Databases without
      encryption at rest may store cardholder data in plaintext, which is a
      critical PCI DSS violation.
    cypher: |
      MATCH (r:Resource)
      WHERE r.scan_start_ms >= $scan_start
        AND (r.encrypted = false OR r.encrypted IS NULL)
        AND r.resource_type IN [
          'rds:DBInstance', 'dynamodb:Table', 'redshift:Cluster',
          'Microsoft.Sql/servers/databases', 'Microsoft.DocumentDB/databaseAccounts',
          'sqladmin:Instance', 'bigquery:Dataset'
        ]
      RETURN labels(r) AS cloud,
             r.resource_type AS type,
             COALESCE(r.arn, r.resource_id) AS resource_id,
             r.name AS name,
             r.region AS region,
             'PCI: Database not encrypted at rest — may expose cardholder data' AS issue
      ORDER BY cloud, r.resource_type, r.name
      LIMIT 100
    recommendation: >
      Enable encryption at rest with customer-managed keys on all databases.
      This is a PCI DSS compliance blocking requirement.
    mitre: ["T1005 - Data from Local System"]
    references: ["https://www.pcisecuritystandards.org/document_library/"]
