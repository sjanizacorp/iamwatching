version: "3.9"

services:
  # ─────────────────────────────────────────────────────────
  # Neo4j — IAM Graph Database
  # ─────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.20-community
    container_name: iamwatching-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP Browser
      - "7687:7687"   # Bolt driver port
    environment:
      NEO4J_AUTH: neo4j/iamwatching
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_memory_pagecache_size: 512M
      NEO4J_dbms_memory_heap_initial__size: 512M
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,gds.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*,gds.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  daemon:
    build:
      context: ..
      dockerfile: docker/Dockerfile.daemon
    container_name: iamwatching-daemon
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: iamwatching
      NEO4J_DATABASE: neo4j
    volumes:
      - ${HOME}/.aws:/root/.aws:ro
    command:
      - "--poll-interval=300"
      - "--log-level=info"
      - "--neo4j=bolt://neo4j:7687"
    profiles:
      - daemon

  auditor:
    build:
      context: ..
      dockerfile: docker/Dockerfile.auditor
    container_name: iamwatching-auditor
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: iamwatching
      NEO4J_DATABASE: neo4j
      AWS_PROFILE: ${AWS_PROFILE:-default}
      AZURE_SUBSCRIPTION_ID: ${AZURE_SUBSCRIPTION_ID:-}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
    volumes:
      - ${HOME}/.aws:/root/.aws:ro
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
      - ./reports:/reports
    command:
      - "iamwatching"
      - "audit"
      - "--aws"
      - "--output=/reports/audit-report.json"
    profiles:
      - audit

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:

networks:
  default:
    name: iamwatching-net
